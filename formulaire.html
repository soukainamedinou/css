<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire d'inscription</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #e9ecef;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        
        form {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        fieldset {
            border: 2px solid #3498db;
            border-radius: 10px;
            margin-bottom: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            
        }
        
        legend {
            background-color: #3498db;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 300;
            font-size: 1.1em;
            border: 2px solid white;
            text-align: center;
        }
        
        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        input[type="radio"], input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }
        
        .groupe-options {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin: 10px 10px 15px 0;
            display: flex;
            gap: 15px;
        }
        
        button {
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: 550;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        .obligatoire::before {
            content: " *";
            color: #e74c3c;
            font-weight: bold;
            font-size: 16px;
        }


    </style>
</head>
<body>
    <h1> FORMULAIRE D'INSCRIPTION</h1>
    <form>
        <fieldset>
            <legend> ÉTAPE 1 : Vos coordonnées</legend>
            
            <label class="obligatoire">Prénom :</label>
            <input type="text" name="prenom" required autocomplete="given-name">
            
            <label class="obligatoire">Nom :</label>
            <input type="text" name="nom" required autocomplete="family-name">

            <label class="obligatoire">Genre :</label>
            <div class="groupe-options">
                    <input type="radio" name="genre" value="homme" required> Homme
                    <input type="radio" name="genre" value="femme" required> Femme
            </div>

            <label class="obligatoire">Email :</label>
            <input type="email" name="email" required autocomplete="email" placeholder="exemple@email.com">
            
            <label class="obligatoire">Téléphone :</label>
            <input type="tel" name="telephone" required 
                   pattern="[0-9]{10}" 
                   maxlength="10"
                   title="Le téléphone doit contenir exactement 10 chiffres (ex: 0612345678)"
                   placeholder="Entrez 10 chiffres sans espaces (ex: 06XXXXXXXX)"
                   autocomplete="tel">
            
            <label class="obligatoire">Date de naissance :</label>
            <input type="date" name="naissance" required 
                   max="2008-01-01" 
                   autocomplete="bday">
        </fieldset>
        
        <fieldset>
            <legend>ÉTAPE 2 : Sécurité</legend>
            
            <label class="obligatoire">Mot de passe :</label>
            <input type="password" name="password" required 
                   pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                   title="le mot de passe doit contenir au moins 8 caractères miniscule, 1 MAJUSCULE, 1 chiffre"
                   autocomplete="new-password"
                   placeholder="Mot de passe sécurisé">
            
            <label class="obligatoire">Confirmer le mot de passe :</label>
            <input type="password" name="confirm_password" required 
                   autocomplete="off"
                   placeholder="Retapez votre mot de passe">
        </fieldset>
        
        <fieldset>
            <legend> ÉTAPE 3 : Localisation</legend>
            
            <label class="obligatoire">Pays :</label>
            <input list="liste-pays" name="pays" required autocomplete="country" placeholder="Choisissez ou tapez">
            <datalist id="liste-pays">
                <option value="France">
                <option value="Belgique">
                <option value="Suisse">
                <option value="Canada">
                <option value="Luxembourg">
                <option value="Maroc">
                <option value="Tunisie">
            </datalist>
            
        </fieldset>
     
        <fieldset>
            <legend> ÉTAPE 4 : À propos de vous </legend>
            
            <label><span style="color: #e74c3c; font-weight: bold;"> *</span> Centres d'intérêt :</label>
            
            <div class="groupe-options">
                    <input type="checkbox" name="sport" value="sport"> Sport
                    <input type="checkbox" name="musique" value="musique"> Musique
                    <input type="checkbox" name="lecture" value="lecture"> Lecture
                    <input type="checkbox" name="voyage" value="voyage"> Voyage
                    <input type="checkbox" name="cuisine" value="cuisine"> Cuisine
                    <input type="checkbox" name="jeux" value="jeux"> Jeux vidéo
            </div>
            
            <label><span style="color: #e74c3c; font-weight: bold;"> *</span> Biographie :</label>
            <textarea name="bio" rows="4" maxlength="300" placeholder="Parlez-nous de vous... (300 caractères maximum)"></textarea>
            
            <label><span style="color: #e74c3c; font-weight: bold;"> *</span> Photo de profil :</label>
            <input type="file" name="photo" accept="image/png, image/jpeg, image/jpg, image/gif">
        </fieldset>
        
        <fieldset>
            <legend> ÉTAPE 5 : Validation</legend>
            <div class="groupe-options">
                <label class="inline-label">
                    <input type="checkbox" name="cgu" required> 
                    <span style="color: #e74c3c; font-weight: bold;"> *</span>
                    J'accepte les conditions générales d'utilisation
                    
                </label>
                
            </div>
            <button type="submit"> CRÉER MON COMPTE</button>
        </fieldset> 
    </form>
    
</body>
</html>
